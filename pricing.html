<!DOCTYPE html>
<html lang="en">
<head>
<script>
  (function(){
    var t = localStorage.getItem('ae_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
    document.documentElement.style.colorScheme = t;
  })();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Price Setter · Aadinath</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --radius: 10px; --radius-lg: 16px; }
:root, [data-theme="dark"] {
  --bg: #060b14; --surface: #0d1525; --surface2: #141f35; --surface3: #1b2a47;
  --border: #1e3252; --border2: #2a4468; --accent: #34d399; --accent-dim: #10b981;
  --accent-glow: rgba(52,211,153,0.18); --text: #f0f6ff; --text2: #94aac4;
  --muted: #6a82a0; --danger: #fb7185; --danger-dim: rgba(251,113,133,0.14);
  --success: #34d399; --success-dim: rgba(52,211,153,0.14); --warn: #fcd34d;
  --warn-dim: rgba(252,211,77,0.14); --blue: #60c4fa; --blue-dim: rgba(96,196,250,0.14);
  --purple: #c084fc; --purple-dim: rgba(192,132,252,0.14); --shadow: 0 4px 20px rgba(0,0,0,0.55), 0 1px 4px rgba(0,0,0,0.3);
}
[data-theme="light"] {
  --bg: #eef2f7; --surface: #ffffff; --surface2: #f5f8fc; --surface3: #ebf0f7;
  --border: #d8e3ef; --border2: #bfcedd; --accent: #059669; --accent-dim: #047857;
  --accent-glow: rgba(5,150,105,0.12); --text: #0d1829; --text2: #1e3048;
  --muted: #5a7090; --danger: #dc2626; --danger-dim: rgba(220,38,38,0.09);
  --success: #059669; --success-dim: rgba(5,150,105,0.09); --warn: #b45309;
  --warn-dim: rgba(180,83,9,0.09); --blue: #0369a1; --blue-dim: rgba(3,105,161,0.09);
  --purple: #6d28d9; --purple-dim: rgba(109,40,217,0.09); --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; overflow: hidden; height: 100vh; }

header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.back-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); padding: 5px 10px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: border-color 0.15s; }
.back-btn:hover { border-color: var(--border2); }
.header-title { font-size: 15px; font-weight: 700; flex: 1; }
.progress-text { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }

.progress-bar-wrap { height: 3px; background: var(--surface2); flex-shrink: 0; }
.progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; width: 0%; }

.pricing-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; overflow: hidden; }

/* CARD STACK */
.card-stack { position: relative; width: 100%; max-width: 400px; height: 440px; }
.price-card { position: absolute; inset: 0; background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 22px; cursor: grab; user-select: none; touch-action: none; box-shadow: 0 12px 40px rgba(0,0,0,0.3); will-change: transform; transition: box-shadow 0.2s; overflow: hidden; }
.price-card:active { cursor: grabbing; }
.price-card.behind { transform: scale(0.95) translateY(8px); opacity: 0.5; pointer-events: none; transition: transform 0.3s, opacity 0.3s; }
.price-card.leaving-right { animation: leaveRight 0.35s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
.price-card.leaving-left  { animation: leaveLeft  0.35s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
@keyframes leaveRight { to { transform: translateX(130%) rotate(22deg); opacity: 0; } }
@keyframes leaveLeft  { to { transform: translateX(-130%) rotate(-22deg); opacity: 0; } }

.swipe-indicator { position: absolute; top: 22px; font-size: 13px; font-weight: 900; letter-spacing: 1px; opacity: 0; pointer-events: none; border: 2.5px solid; border-radius: 6px; padding: 4px 10px; transition: opacity 0.05s; }
.swipe-indicator.save { left: 18px; color: var(--accent); border-color: var(--accent); transform: rotate(-12deg); }
.swipe-indicator.skip { right: 18px; color: var(--danger); border-color: var(--danger); transform: rotate(12deg); }

.card-badge { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; display: inline-block; margin-bottom: 10px; }
.card-name { font-size: 19px; font-weight: 700; color: var(--text); margin-bottom: 3px; line-height: 1.25; }
.card-sku { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent-dim); margin-bottom: 14px; }
.card-stocks { display: flex; gap: 8px; margin-bottom: 16px; }
.stock-chip { display: flex; flex-direction: column; align-items: center; padding: 6px 12px; border-radius: 8px; min-width: 58px; }
.stock-chip.main-loc { background: var(--success-dim); color: var(--accent); border: 1px solid rgba(74,222,128,0.2); }
.stock-chip.back-loc { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(251,191,36,0.2); }
.stock-chip.hold-loc { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
.stock-chip-num { font-size: 22px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
.stock-chip-label { font-size: 8px; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }

.cur-prices-row { display: flex; gap: 8px; margin-bottom: 14px; }
.cur-price-chip { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 3px 9px; color: var(--muted); }
.cur-price-chip b { color: var(--text2); }

.price-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.price-field label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 5px; }
.price-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700; outline: none; transition: border-color 0.15s; -moz-appearance: textfield; }
.price-field input::-webkit-outer-spin-button, .price-field input::-webkit-inner-spin-button { -webkit-appearance: none; }
.price-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

/* BOTTOM ACTION BAR */
.action-bar { background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 20px; padding: 14px 20px 30px; flex-shrink: 0; }
.action-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.action-circle { width: 58px; height: 58px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; transition: transform 0.15s, opacity 0.15s; font-family: 'DM Sans', sans-serif; }
.action-circle:active { transform: scale(0.9); }
.btn-skip { background: var(--danger-dim); color: var(--danger); border: 2px solid rgba(251,113,133,0.35); }
.btn-skip:hover { background: var(--danger); color: #fff; }
.btn-undo { width: 44px; height: 44px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); font-size: 17px; }
.btn-save { background: var(--success-dim); color: var(--accent); border: 2px solid rgba(52,211,153,0.35); }
.btn-save:hover { background: var(--accent); color: #fff; }
.action-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }

/* SCREENS */
.screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; text-align: center; flex: 1; }
.screen-icon { font-size: 56px; margin-bottom: 16px; }
.screen-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.screen-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; max-width: 320px; }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dim)); color: #fff; border: none; border-radius: var(--radius); padding: 12px 28px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; display: inline-block; box-shadow: 0 4px 14px var(--accent-glow); transition: opacity 0.15s, transform 0.15s; }
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 20px; font-weight: 600; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; display: inline-block; margin-top: 8px; transition: border-color 0.15s, color 0.15s; }
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }

/* SKIPPED REVIEW */
.skipped-list { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; padding: 4px; }
.skipped-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
.skipped-name { font-weight: 600; font-size: 13px; }
.skipped-sku { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

.loader { display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--muted); }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--surface3); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 600; z-index: 999; transition: transform 0.25s ease; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.4); pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--success-dim); border-color: rgba(74,222,128,0.3); color: var(--accent); }
.toast.error   { background: var(--danger-dim);  border-color: rgba(248,113,113,0.3); color: var(--danger); }
.toast.info    { background: var(--purple-dim);  border-color: rgba(167,139,250,0.3); color: var(--purple); }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← Back</a>
  <div class="header-title">💰 Price Setter</div>
  <div class="progress-text" id="progressText">Loading…</div>
</header>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>

<div class="pricing-main" id="mainArea">
  <div class="loader"><div class="spinner"></div> Loading products…</div>
</div>

<div class="action-bar" id="actionBar" style="display:none">
  <div class="action-col">
    <button class="action-circle btn-skip" onclick="doSkip()" title="Skip for later">✕</button>
    <div class="action-label">Skip</div>
  </div>
  <div class="action-col">
    <button class="action-circle btn-undo" onclick="doUndo()" title="Undo last save">↩</button>
    <div class="action-label">Undo</div>
  </div>
  <div class="action-col">
    <button class="action-circle btn-save" onclick="doSave()" title="Save price">✓</button>
    <div class="action-label">Save</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://mculftdutoavwueluyma.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jdWxmdGR1dG9hdnd1ZWx1eW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0Mjk2NzAsImV4cCI6MjA5MDAwNTY3MH0.s-OLgLDXR5aN3uQlS5yAO2sk6Bot0TibtI4qFjrzZh4';
const H = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

let allProducts = [], locationStock = {}, queue = [], skipped = [], saveHistory = [];
let dragging = false, startX = 0, dragX = 0, activeCard = null;

async function init() {
  try {
    const [pr, sr] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/products?select=*&active_status=eq.true&order=product_name.asc`, { headers: H }),
      fetch(`${SUPABASE_URL}/rest/v1/stock_by_location?select=*`, { headers: H })
    ]);
    if (!pr.ok || !sr.ok) throw new Error('Failed to load data');
    allProducts = await pr.json();
    (await sr.json()).forEach(r => {
      if (!locationStock[r.product_id]) locationStock[r.product_id] = {};
      locationStock[r.product_id][r.location_id] = r.quantity;
    });
    queue = [...allProducts];
    renderCard();
  } catch(e) {
    document.getElementById('mainArea').innerHTML = `<div class="screen"><div class="screen-icon">⚠️</div><div class="screen-title">Error</div><div class="screen-sub">${e.message}</div><a href="index.html" class="btn-ghost">← Back</a></div>`;
  }
}

function updateProgress() {
  const done = allProducts.length - queue.length - skipped.length;
  const pct = allProducts.length ? (done / allProducts.length * 100) : 0;
  document.getElementById('progressText').textContent = `${done} / ${allProducts.length}`;
  document.getElementById('progressBar').style.width = pct + '%';
}

function renderCard() {
  updateProgress();
  const main = document.getElementById('mainArea');
  const bar  = document.getElementById('actionBar');

  if (!queue.length) {
    bar.style.display = 'none';
    showEndScreen(main);
    return;
  }

  bar.style.display = 'flex';
  const p    = queue[0];
  const next = queue[1];
  const locs = locationStock[p.product_id] || {};
  const mainQ = locs[1] || 0;
  const backQ = locs[2] || 0;
  const holdQ = locs[3] || 0;

  main.innerHTML = `
    <div class="card-stack" id="cardStack">
      ${next ? `<div class="price-card behind" id="behindCard"></div>` : ''}
      <div class="price-card" id="activeCard">
        <div class="swipe-indicator save" id="indSave">SAVE</div>
        <div class="swipe-indicator skip" id="indSkip">SKIP</div>
        <div class="card-badge">${[p.type, p.brand].filter(Boolean).join(' · ') || 'Product'}</div>
        <div class="card-name">${p.product_name}</div>
        <div class="card-sku">${p.stock_keeping_unit || 'No SKU'}</div>
        <div class="card-stocks">
          <div class="stock-chip main-loc"><div class="stock-chip-num">${mainQ}</div><div class="stock-chip-label">Main</div></div>
          <div class="stock-chip back-loc"><div class="stock-chip-num">${backQ}</div><div class="stock-chip-label">Back</div></div>
          ${holdQ > 0 ? `<div class="stock-chip hold-loc"><div class="stock-chip-num">${holdQ}</div><div class="stock-chip-label">Hold</div></div>` : ''}
        </div>
        ${(p.selling_price != null || p.buying_price != null) ? `
          <div class="cur-prices-row">
            ${p.selling_price != null ? `<div class="cur-price-chip">Sell: <b>₹${p.selling_price}</b></div>` : ''}
            ${p.buying_price  != null ? `<div class="cur-price-chip">Buy: <b>₹${p.buying_price}</b></div>`  : ''}
          </div>
        ` : ''}
        <div class="price-inputs">
          <div class="price-field">
            <label>Selling Price ₹</label>
            <input type="number" id="inp_sell" placeholder="0.00" value="${p.selling_price ?? ''}" min="0" step="0.01" inputmode="decimal">
          </div>
          <div class="price-field">
            <label>Buying Price ₹</label>
            <input type="number" id="inp_buy" placeholder="0.00" value="${p.buying_price ?? ''}" min="0" step="0.01" inputmode="decimal">
          </div>
        </div>
      </div>
    </div>`;

  activeCard = document.getElementById('activeCard');
  attachDrag(activeCard);
}

function attachDrag(card) {
  const indSave = document.getElementById('indSave');
  const indSkip = document.getElementById('indSkip');

  const onStart = e => {
    if (e.target.tagName === 'INPUT') return;
    dragging = true;
    startX = e.touches ? e.touches[0].clientX : e.clientX;
    card.style.transition = 'none';
  };

  const onMove = e => {
    if (!dragging) return;
    dragX = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
    const rot = dragX * 0.07;
    card.style.transform = `translateX(${dragX}px) rotate(${rot}deg)`;
    const pct = Math.min(Math.abs(dragX) / 90, 1);
    indSave.style.opacity = dragX > 0 ? pct : 0;
    indSkip.style.opacity = dragX < 0 ? pct : 0;
    e.preventDefault();
  };

  const onEnd = () => {
    if (!dragging) return;
    dragging = false;
    card.style.transition = '';
    if      (dragX >  80) doSave();
    else if (dragX < -80) doSkip();
    else {
      card.style.transform = '';
      indSave.style.opacity = 0;
      indSkip.style.opacity = 0;
    }
    dragX = 0;
  };

  card.addEventListener('mousedown',  onStart);
  card.addEventListener('touchstart', onStart, { passive: false });
  window.addEventListener('mousemove',  onMove);
  window.addEventListener('touchmove',  onMove, { passive: false });
  window.addEventListener('mouseup',   onEnd);
  window.addEventListener('touchend',  onEnd);
}

async function doSave() {
  if (!queue.length) return;
  const p    = queue[0];
  const sell = parseFloat(document.getElementById('inp_sell')?.value) || null;
  const buy  = parseFloat(document.getElementById('inp_buy')?.value)  || null;

  activeCard?.classList.add('leaving-right');

  setTimeout(async () => {
    saveHistory.push({ product: p, prev_sell: p.selling_price, prev_buy: p.buying_price });
    queue.shift();
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/products?product_id=eq.${p.product_id}`, {
        method: 'PATCH', headers: H, body: JSON.stringify({ selling_price: sell, buying_price: buy })
      });
      const idx = allProducts.findIndex(x => x.product_id === p.product_id);
      if (idx >= 0) { allProducts[idx].selling_price = sell; allProducts[idx].buying_price = buy; }
    } catch(e) { showToast('Save failed: ' + e.message, 'error'); }
    renderCard();
  }, 300);
}

function doSkip() {
  if (!queue.length) return;
  activeCard?.classList.add('leaving-left');
  setTimeout(() => { skipped.push(queue.shift()); renderCard(); }, 300);
}

async function doUndo() {
  if (!saveHistory.length) { showToast('Nothing to undo', 'error'); return; }
  const { product, prev_sell, prev_buy } = saveHistory.pop();
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/products?product_id=eq.${product.product_id}`, {
      method: 'PATCH', headers: H, body: JSON.stringify({ selling_price: prev_sell, buying_price: prev_buy })
    });
    product.selling_price = prev_sell;
    product.buying_price  = prev_buy;
    queue.unshift(product);
    renderCard();
    showToast('↩ Undone — price restored', 'info');
  } catch(e) { showToast('Undo failed', 'error'); }
}

function showEndScreen(main) {
  if (!skipped.length) {
    main.innerHTML = `
      <div class="screen">
        <div class="screen-icon">🎉</div>
        <div class="screen-title">All done!</div>
        <div class="screen-sub">Prices set for all ${allProducts.length} products.</div>
        <a href="index.html" class="btn-primary">← Back to Inventory</a>
      </div>`;
    return;
  }

  main.innerHTML = `
    <div class="screen" style="width:100%;max-width:480px;">
      <div class="screen-icon">🔄</div>
      <div class="screen-title">Review Skipped</div>
      <div class="screen-sub">${skipped.length} product${skipped.length > 1 ? 's were' : ' was'} skipped.</div>
      <button class="btn-primary" onclick="reviewSkipped()" style="margin-bottom:8px;">Set Prices for Skipped</button>
      <a href="index.html" class="btn-ghost">Skip & go to Inventory</a>
      <div class="skipped-list" style="margin-top:20px;">
        ${skipped.map(p => `
          <div class="skipped-card">
            <div style="flex:1">
              <div class="skipped-name">${p.product_name}</div>
              <div class="skipped-sku">${p.stock_keeping_unit || 'No SKU'}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function reviewSkipped() {
  queue = [...skipped];
  skipped = [];
  document.getElementById('actionBar').style.display = 'flex';
  renderCard();
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

init();
</script>
</body>
</html>
